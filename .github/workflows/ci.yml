name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go fmt
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))" != "" ]; then
            echo "Go files are not formatted"
            gofmt -l $(find . -name '*.go' -not -path './.git/*')
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...
